services:
  wordpress:
    image: wordpress:6.7-php8.2-apache
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_NAME: wp
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_HOST: db
    volumes:
      - ./:/var/www/html/wp-content/themes/dublin-painter
    depends_on:
      - db

  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: wp
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
